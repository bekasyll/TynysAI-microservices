server:
  port: 9000

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/tynysai_appointments
    username: postgres
    password: password

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    show-sql: true

  cloud:
    function:
      definition: handleReportCreated
    stream:
      bindings:
        sendNotification-out-0:
          destination: tynysai.notifications
        handleReportCreated-in-0:
          destination: tynysai.reports
          group: appointment-service
      kafka:
        binder:
          brokers:
            - localhost:9092

spring.cloud.openfeign:
  circuitbreaker:
    enabled: true
  client:
    config:
      default:
        connect-timeout: 2000
        read-timeout: 5000
        logger-level: BASIC

resilience4j.circuitbreaker:
  configs:
    default:
      sliding-window-size: 10
      permitted-number-of-calls-in-half-open-state: 2
      failure-rate-threshold: 50
      wait-duration-in-open-state: 10s

resilience4j.timelimiter:
  configs:
    default:
      timeout-duration: 6s

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8070/eureka

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    liveness-state:
      enabled: true
    readiness-state:
      enabled: true
  info:
    env:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

info:
  app:
    name: "appointment-service"
    description: "TynysAI Appointment Service - manages doctor appointments and scheduling"

logging:
  level:
    com:
      tynysai:
        appointmentservice: DEBUG
  pattern:
    level: "%5p[${spring.application.name},%X{trace_id},%X{span_id}]"