server:
  port: 8072

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:7080/realms/tynysai/protocol/openid-connect/certs
          issuer-uri: http://localhost:7080/realms/tynysai

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
              lower-case-service-id: true
          httpclient:
            connect-timeout: 1000
            response-timeout: 10s

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      access: unrestricted
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8070/eureka

info:
  app:
    name: "gateway-server"
    description: "TynysAI Gateway Server - routes API requests to backend microservices via Eureka discovery"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    urls:
      - name: user-service
        url: /v3/api-docs/user-service
      - name: appointment-service
        url: /v3/api-docs/appointment-service
      - name: medical-record-service
        url: /v3/api-docs/medical-record-service
      - name: notification-service
        url: /v3/api-docs/notification-service
      - name: xray-service
        url: /v3/api-docs/xray-service
  api-docs:
    enabled: true

resilience4j.circuitbreaker:
  configs:
    default:
      sliding-window-size: 10
      permitted-number-of-calls-in-half-open-state: 2
      failure-rate-threshold: 50
      wait-duration-in-open-state: 10s

resilience4j.timelimiter:
  configs:
    default:
      timeout-duration: 5s

logging:
  level:
    com:
      tynysai:
        gatewayserver: DEBUG
  pattern:
    level: "%5p[${spring.application.name},%X{trace_id},%X{span_id}]"