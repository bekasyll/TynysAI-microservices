server:
  port: 8090

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/tynysai_medical_records
    username: postgres
    password: Beka04

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  cloud:
    stream:
      bindings:
        sendNotification-out-0:
          destination: tynysai.notifications
        sendReportCreated-out-0:
          destination: tynysai.reports
      kafka:
        binder:
          brokers:
            - localhost:9092

services:
  user-service:
    url: http://localhost:8080

spring.cloud.openfeign:
  circuitbreaker:
    enabled: true

resilience4j.circuitbreaker:
  configs:
    default:
      sliding-window-size: 10
      permitted-number-of-calls-in-half-open-state: 2
      failure-rate-threshold: 50
      wait-duration-in-open-state: 10s

resilience4j.timelimiter:
  configs:
    default:
      timeout-duration: 6s

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8070/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    env:
      enabled: true

info:
  app:
    name: "medical-record-service"
    description: "TynysAI Medical Record Service - manages diagnostic reports and laboratory results"

logging:
  level:
    com:
      tynysai:
        medicalrecordservice: DEBUG
  pattern:
    level: "%5p[${spring.application.name},%X{trace_id},%X{span_id}]"