server:
  port: 8080

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/tynysai_users
    username: postgres
    password: password

  jpa:
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    show-sql: true

  sql:
    init:
      mode: always

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:7080/realms/tynysai}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:7080/realms/tynysai/protocol/openid-connect/certs}

app:
  file:
    upload-dir: ./uploads

tynysai:
  keycloak:
    admin:
      base-url: ${KEYCLOAK_BASE_URL:http://localhost:7080}
      realm: ${KEYCLOAK_REALM:tynysai}
      client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:tynysai-backend-admin}
      client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:}

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8070/eureka

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    liveness-state:
      enabled: true
    readiness-state:
      enabled: true
  info:
    env:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

info:
  app:
    name: "user-service"
    description: "TynysAI User Service - manages user accounts, patient and doctor profiles"

logging:
  level:
    com:
      tynysai:
        userservice: DEBUG
  pattern:
    level: "%5p[${spring.application.name},%X{trace_id},%X{span_id}]"