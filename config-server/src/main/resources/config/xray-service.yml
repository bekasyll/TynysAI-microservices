server:
  port: 9020

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/tynysai_xrays
    username: postgres
    password: password

  jpa:
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    show-sql: true

  sql:
    init:
      mode: always

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

  cloud:
    function:
      definition: handleReportCreated
    stream:
      bindings:
        sendNotification-out-0:
          destination: tynysai.notifications
        handleReportCreated-in-0:
          destination: tynysai.reports
          group: xray-service
      kafka:
        binder:
          brokers:
            - localhost:9092

app:
  storage:
    root: ${user.home}/tynysai-storage/xrays
  ai:
    service-url: http://localhost:8000
    enabled: true
    confidence-threshold: 0.70

spring.cloud.openfeign:
  circuitbreaker:
    enabled: true
  client:
    config:
      default:
        connect-timeout: 2000
        read-timeout: 5000
        logger-level: BASIC

resilience4j.circuitbreaker:
  configs:
    default:
      sliding-window-size: 10
      permitted-number-of-calls-in-half-open-state: 2
      failure-rate-threshold: 50
      wait-duration-in-open-state: 10s

resilience4j.timelimiter:
  configs:
    default:
      timeout-duration: 6s

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8070/eureka

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    liveness-state:
      enabled: true
    readiness-state:
      enabled: true
  info:
    env:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

info:
  app:
    name: "xray-service"
    description: "TynysAI Xray Service - handles chest X-ray uploads, AI analysis via Python service, and doctor validation"

logging:
  level:
    com:
      tynysai:
        xrayservice: DEBUG
  pattern:
    level: "%5p[${spring.application.name},%X{trace_id},%X{span_id}]"