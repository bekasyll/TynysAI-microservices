server:
  port: 8080

spring:
  application:
    name: user-service

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/tynysai_users
    username: postgres
    password: Beka04

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    show-sql: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  file:
    upload-dir: ./uploads

management:
  endpoints:
    web:
      exposure:
        include: health,info

info:
  app:
    name: "user-service"
    description: "TynysAI User Service - manages user accounts, patient and doctor profiles"

logging:
  level:
    com:
      tynysai:
        userservice: DEBUG
  pattern:
    level: "%5p[${spring.application.name},%X{trace_id},%X{span_id}]"